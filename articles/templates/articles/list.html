<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des Articles</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
        h1 { color: #2c3e50; }
        .article { background: #fff; border: 1px solid #ddd; border-radius: 5px; padding: 15px; margin-bottom: 15px; }
        .title { font-weight: bold; font-size: 18px; color: #34495e; }
        .content { margin-top: 8px; font-size: 15px; line-height: 1.4; }
        .date { margin-top: 5px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <h1>Liste des Articles</h1>
    {% for article in articles %}
        <div class="article">
            <div class="title">{{ article.title }}</div>
            <div class="content">{{ article.content }}</div>
            <div class="date">Publié le {{ article.created_at }}</div>
        </div>
    {% empty %}
        <p>Aucun article disponible.</p>
    {% endfor %}
</body>
</html>
