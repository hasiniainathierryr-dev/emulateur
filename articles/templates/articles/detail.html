<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ article.title }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
        h1 { color: #2c3e50; }
        .content { margin-top: 15px; font-size: 16px; line-height: 1.5; }
        .date { margin-top: 10px; font-size: 12px; color: #888; }
        a { display: inline-block; margin-top: 20px; text-decoration: none; color: #3498db; }
    </style>
</head>
<body>
    <h1>{{ article.title }}</h1>
    <div class="content">{{ article.content }}</div>
    <div class="date">Publié le {{ article.created_at }}</div>
    <a href="/articles/">← Retour à la liste</a>
</body>
</html>
