{% extends "base.html" %}
{% block title %}Ajouter une application{% endblock %}

{% block content %}
<div class="add-app-container">
    <h1><i class="fa-solid fa-plus"></i> Ajouter une application</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Ajouter</button>
    </form>
</div>

<style>
.add-app-container {
    margin: 40px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
}
.add-app-container h1 {
    color: #ffcc00;
    margin-bottom: 20px;
}
.btn {
    background: #ffcc00;
    color: #000;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
    text-decoration: none;
}
.btn:hover {
    background: #ffaa00;
}
</style>
{% endblock %}
