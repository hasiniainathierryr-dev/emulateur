{% extends "base.html" %}
{% load static %}

{% block title %}Applications{% endblock %}

{% block content %}
<div class="settings-container">
    <h1 class="title"><i class="fa-solid fa-mobile-screen"></i> Applications</h1>
    <button type="button" onclick="listApps()">📱 Actualiser la liste</button>
    <div id="appsList"></div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

.settings-container {
    margin-left: 100px;
    padding: 20px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
}

.title {
    font-size: 2em;
    color: #ffcc00;
    text-shadow: 0 0 10px #ffaa00;
    margin-bottom: 20px;
    font-weight: 600;
}

button {
    padding: 5px 10px;
    border-radius: 5px;
    border: none;
    background: #ffcc00;
    color: #000;
    cursor: pointer;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
}

button:hover { background: #ffaa00; }

.app-item {
    margin: 10px 0;
    font-weight: 600;
    background: #222;
    padding: 10px;
    border-radius: 5px;
}
</style>

<script>
function listApps() {
    fetch("/api/waydroid/apps/")
    .then(r => r.json())
    .then(data => {
        const container = document.getElementById("appsList");
        container.innerHTML = "";
        data.apps.forEach(app => {
            const div = document.createElement("div");
            div.className = "app-item";
            div.innerHTML = `
                📱 ${app.name} - ${app.version} (${app.package})
                <button type="button" onclick="openApp('${app.package}')">Ouvrir</button>
                <button type="button" onclick="deleteApp('${app.id}')">🗑️ Effacer</button>
            `;
            container.appendChild(div);
        });
    })
    .catch(error => console.error("Erreur lors du chargement des applications :", error));
}

function openApp(pkg) {
    fetch(`/api/waydroid/open_app/${pkg}/`, { method: "POST" })
    .then(r => r.json())
    .then(data => {
        alert(data.message);
    })
    .catch(error => console.error("Erreur lors de l'ouverture :", error));
}

function deleteApp(appId) {
    fetch(`/api/waydroid/delete_app/${appId}/`, { method: "POST" })
    .then(r => r.json())
    .then(data => {
        alert(data.message);
        listApps(); // recharger la liste après suppression
    })
    .catch(error => console.error("Erreur lors de la suppression :", error));
}

document.addEventListener("DOMContentLoaded", listApps);
</script>
{% endblock %}
