{% extends "base.html" %}
{% load static %}

{% block title %}Emulateur Android{% endblock %}

{% block content %}
<div class="emulator-container">
    <h1 class="title"><i class="fa-solid fa-mobile-screen"></i> Espace Android</h1>
    <input type="text" id="searchBar" placeholder="🔍 Rechercher une application..." onkeyup="filterApps()">
    <button type="button" onclick="loadApps()">📱 Actualiser la liste</button>

    <div class="emulator-grid" id="appsGrid"></div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

.emulator-container {
    margin-left: 100px;
    padding: 20px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
}

.title {
    font-size: 2em;
    color: #00ccff;
    text-shadow: 0 0 10px #00aaff;
    margin-bottom: 20px;
    font-weight: 600;
}

#searchBar {
    padding: 8px;
    border-radius: 5px;
    border: none;
    margin-bottom: 20px;
    width: 300px;
}

button {
    padding: 5px 10px;
    border-radius: 5px;
    border: none;
    background: #00ccff;
    color: #000;
    cursor: pointer;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    margin-left: 10px;
}

button:hover { background: #0099cc; }

.emulator-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 120px);
    gap: 20px;
    margin-top: 20px;
}

.app-icon {
    text-align: center;
    background: #222;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s;
}

.app-icon:hover {
    transform: scale(1.1);
    background: #333;
}

.app-icon img {
    width: 64px;
    height: 64px;
    margin-bottom: 10px;
}
</style>

<script>
let appsData = [];

function loadApps() {
    fetch("/api/waydroid/apps/")
    .then(r => r.json())
    .then(data => {
        appsData = data.apps;
        renderApps(appsData);
    })
    .catch(error => console.error("Erreur lors du chargement des applications :", error));
}

function renderApps(apps) {
    const grid = document.getElementById("appsGrid");
    grid.innerHTML = "";
    if (apps.length === 0) {
        grid.innerHTML = "<p>Aucune application installée.</p>";
        return;
    }
    apps.forEach(app => {
        const icon = document.createElement("div");
        icon.className = "app-icon";
        icon.innerHTML = `
            <img src="/static/icons/${app.package}.png" alt="${app.name}" onerror="this.src='/static/icons/default.png'">
            <p>${app.name}</p>
            <button onclick="openApp('${app.package}')">Ouvrir</button>
            <button onclick="deleteApp('${app.id}')">🗑️ Effacer</button>
        `;
        grid.appendChild(icon);
    });
}

function filterApps() {
    const query = document.getElementById("searchBar").value.toLowerCase();
    const filtered = appsData.filter(app => app.name.toLowerCase().includes(query));
    renderApps(filtered);
}

function openApp(pkg) {
    fetch(`/api/waydroid/open_app/${pkg}/`, { method: "POST" })
    .then(r => r.json())
    .then(data => alert(data.message))
    .catch(error => console.error("Erreur lors de l'ouverture :", error));
}

function deleteApp(appId) {
    fetch(`/api/waydroid/delete_app/${appId}/`, { method: "POST" })
    .then(r => r.json())
    .then(data => {
        alert(data.message);
        loadApps();
    })
    .catch(error => console.error("Erreur lors de la suppression :", error));
}

document.addEventListener("DOMContentLoaded", loadApps);
</script>
{% endblock %}
