{% extends "base.html" %}
{% load static %}

{% block title %}Son{% endblock %}

{% block content %}
<div class="settings-container">
    <h1 class="title"><i class="fa-solid fa-volume-high"></i> Réglages Son</h1>

    <!-- Volume -->
    <div class="setting">
        <label>Volume</label>
        <input type="range" id="volume" min="0" max="100" value="50">
    </div>

    <!-- Mode audio -->
    <div class="setting">
        <label>Mode audio</label>
        <select id="soundMode">
            <option value="stereo">Stéréo</option>
            <option value="mono">Mono</option>
            <option value="rock">Rock</option>
            <option value="classique">Classique</option>
            <option value="jazz">Jazz</option>
            <option value="pop">Pop</option>
        </select>
    </div>

    <button type="button" onclick="applySound()">🎵 Appliquer</button>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

.settings-container {
    margin-left: 100px;
    padding: 20px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
}

.title {
    font-size: 2em;
    color: #ffcc00;
    text-shadow: 0 0 10px #ffaa00;
    margin-bottom: 20px;
    font-weight: 600;
}

.setting { margin: 20px 0; font-weight: 600; }

select, input, button {
    padding: 5px 10px;
    border-radius: 5px;
    border: none;
    font-family: 'Poppins', sans-serif;
}

button {
    background: #ffcc00;
    color: #000;
    cursor: pointer;
    font-weight: 600;
}

button:hover { background: #ffaa00; }
</style>

<script>
function applySound() {
    const volume = document.getElementById("volume").value;
    const mode = document.getElementById("soundMode").value;
    const formData = new FormData();
    formData.append("volume", volume);
    formData.append("mode", mode);

    fetch("/api/waydroid/sound/", { method: "POST", body: formData })
    .then(r => r.json())
    .then(data => {
        alert(data.message);
    })
    .catch(error => console.error("Erreur lors de l'application du son :", error));
}

// Charger les valeurs actuelles au démarrage
document.addEventListener("DOMContentLoaded", function() {
    fetch("/api/waydroid/get_sound/")
    .then(r => r.json())
    .then(data => {
        if (data.status === "success") {
            document.getElementById("volume").value = data.volume;
            document.getElementById("soundMode").value = data.mode;
        }
    })
    .catch(error => console.error("Erreur lors du chargement du son :", error));
});
</script>
{% endblock %}
