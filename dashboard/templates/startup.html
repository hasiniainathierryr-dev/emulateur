{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Démarrage HTplayerApp</title>

    <!-- Manifest pour PWA -->
    <link rel="manifest" href="{% static 'manifest.json' %}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Couleur thème -->
    <meta name="theme-color" content="#ffcc00">

    <style>
        body {
            margin: 0;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Segoe UI", sans-serif;
            color: #ffcc00;
            overflow: hidden;
            flex-direction: column;
        }
        .splash { text-align: center; animation: fadeIn 2s ease-in-out; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .logo { font-size: 48px; font-weight: bold; margin-bottom: 20px; animation: glow 2s infinite alternate; }
        .loader { border: 6px solid #333; border-top: 6px solid #ffcc00; border-radius: 50%; width: 70px; height: 70px; animation: spin 1.5s linear infinite; margin: 20px auto; }
        .progress-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, #ffcc00, #ffaa00); transition: width 0.15s linear; }
        .dots { display: inline-block; font-size: 28px; letter-spacing: 5px; }
        .dots span { animation: blink 1.5s infinite; }
        .dots span:nth-child(2) { animation-delay: 0.3s; }
        .dots span:nth-child(3) { animation-delay: 0.6s; }
        .percentage { margin-top: 15px; font-size: 20px; font-weight: bold; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes glow { from { text-shadow: 0 0 5px #ffcc00; } to { text-shadow: 0 0 20px #ffcc00, 0 0 40px #ffaa00; } }
        .halo { animation: haloEffect 2s ease forwards; }
        @keyframes haloEffect { from { box-shadow: 0 0 20px #ffcc00; } to { box-shadow: 0 0 60px #ffaa00, 0 0 100px #ffcc00; } }
        .fade-out { animation: fadeOut 2s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: scale(1.1); } }
        #enableSound { margin-top: 20px; padding: 10px 20px; background: #ffcc00; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; color: #121212; font-weight: bold; }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <div class="logo">HTplayerApp</div>
        <p>Lancement magique <i class="fas fa-magic"></i></p>
        <div class="loader"></div>
        <p>Démarrage en cours <span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
        <div class="percentage" id="percentage">0%</div>
        <button id="enableSound">🔊 Activer le son</button>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Son final -->
    <audio id="dingSound" src="{% static 'audio/bip.mp3' %}" preload="auto"></audio>

    <script>
        let progress = 0;
        const progressBar = document.getElementById("progressBar");
        const percentageText = document.getElementById("percentage");
        const dingSound = document.getElementById("dingSound");
        const enableSoundBtn = document.getElementById("enableSound");
        let soundEnabled = false;

        enableSoundBtn.addEventListener("click", () => {
            soundEnabled = true;
            dingSound.play().catch(() => {});
            enableSoundBtn.style.display = "none";
        });

        const duration = 15000; // durée totale (15s)
        const interval = 150;   // intervalle de mise à jour
        const step = 100 / (duration / interval);

        const timer = setInterval(() => {
            progress += step;
            if (progress >= 100) {
                progress = 100;
                clearInterval(timer);
                progressBar.classList.add("halo");
                if (soundEnabled) {
                    dingSound.play().catch(err => console.log("Lecture bloquée :", err));
                }
            }
            progressBar.style.width = progress + "%";
            percentageText.textContent = Math.floor(progress) + "%";
        }, interval);

        // Transition vers la page d'accueil
        setTimeout(() => {
            document.getElementById("splash").classList.add("fade-out");
            setTimeout(() => { window.location.href = "/home/"; }, 2000);
        }, duration);

        // ✅ Enregistrement unique du Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("{% static 'js/service-worker.js' %}")
                .then(reg => console.log("Service Worker enregistré :", reg))
                .catch(err => console.error("Erreur SW :", err));
        }
    </script>
</body>
</html>
